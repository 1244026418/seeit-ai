name: seeit-ai

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: media_db
    ports:
      - "3307:3306"
    volumes:
      - seeit_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rmqnamesrv:
    image: apache/rocketmq:4.9.4
    command: sh mqnamesrv
    ports:
      - "9876:9876"

  rmqbroker:
    image: apache/rocketmq:4.9.4
    command: sh mqbroker -n rmqnamesrv:9876
    environment:
      NAMESRV_ADDR: rmqnamesrv:9876
    depends_on:
      - rmqnamesrv
    ports:
      - "10909:10909"
      - "10911:10911"

  api:
    build: ./backend
    ports:
      - "9090:9090"
    environment: &app_environment
      DATABASE_URL: mysql+pymysql://root:root@mysql:3306/media_db?charset=utf8mb4
      REDIS_URL: redis://redis:6379/0
      ROCKETMQ_NAMESERVER: rmqnamesrv:9876
      ROCKETMQ_TOPIC: video-analysis-topic
      BILIBILI_IMPORT_ENABLED: "true"
      BILIBILI_MAX_DURATION_SECONDS: "600"
      BILIBILI_MAX_FILE_BYTES: "536870912"
      BILIBILI_IMPORT_ATTEMPTS: "3"
      JWT_SECRET: change-this-before-deploying
      AUTO_CREATE_SCHEMA: "false"
      UPLOAD_ROOT: /data/uploads
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      AI_BASE_URL: ${AI_BASE_URL:-https://api.deepseek.com}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-deepseek-v4-flash}
      AI_THINKING_MODE: ${AI_THINKING_MODE:-disabled}
      AI_REQUEST_TIMEOUT_SECONDS: ${AI_REQUEST_TIMEOUT_SECONDS:-180}
    volumes:
      - seeit_uploads:/data/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rmqbroker:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9090/health')"]
      interval: 5s
      timeout: 3s
      retries: 20

  worker:
    build: ./backend
    command: python -m seeit.worker
    environment:
      <<: *app_environment
      LOCAL_ASR_ENABLED: "true"
      LOCAL_ASR_MODEL: base
      LOCAL_ASR_MODEL_ROOT: /data/models
      LOCAL_ASR_DEVICE: cpu
      LOCAL_ASR_COMPUTE_TYPE: int8
      LOCAL_ASR_CPU_THREADS: "4"
      LOCAL_ASR_LANGUAGE: zh
      LOCAL_ASR_BEAM_SIZE: "5"
      LOCAL_ASR_VAD_FILTER: "true"
      LOCAL_ASR_PRELOAD: "true"
      LOCAL_ASR_RELEASE_BEFORE_OCR: "true"
      LOCAL_ASR_INITIAL_PROMPT: 以下是中文技术视频的逐字稿，涉及 GPT、Sol、Terra、Luna、Reasoning Effort、Token 和 API。请使用自然标点。
      LOCAL_ASR_HOTWORDS: ""
      OCR_ENABLED: "true"
      OCR_INTERVAL_SECONDS: "30"
      PADDLEOCR_MODEL_ROOT: /data/models/paddlex
      PADDLEOCR_MODEL_SOURCE: bos
      PADDLEOCR_DETECTION_MODEL: PP-OCRv5_mobile_det
      PADDLEOCR_RECOGNITION_MODEL: PP-OCRv5_mobile_rec
      PADDLEOCR_DEVICE: cpu
      PADDLEOCR_CPU_THREADS: "4"
      PADDLEOCR_ENABLE_MKLDNN: "true"
      PADDLEOCR_CONFIDENCE_THRESHOLD: "0.65"
      PADDLEOCR_DEDUP_THRESHOLD: "0.88"
      PADDLEOCR_MIN_TEXT_LENGTH: "2"
      PADDLEOCR_MAX_FRAMES: "20"
      PADDLEOCR_FRAME_MAX_WIDTH: "960"
      PADDLEOCR_PROCESS_TIMEOUT_SECONDS: "600"
    volumes:
      - seeit_uploads:/data/uploads
      - seeit_models:/data/models
    depends_on:
      api:
        condition: service_healthy
      rmqbroker:
        condition: service_started
    mem_limit: 2560m

  mcp:
    build: ./backend
    command: python -m seeit.mcp_server --transport streamable-http --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      SEEIT_API_URL: http://api:9090
      SEEIT_MCP_PUBLIC_URL: http://localhost:8001/mcp
      SEEIT_MCP_ISSUER_URL: http://localhost:9090
    depends_on:
      api:
        condition: service_healthy

volumes:
  seeit_mysql:
  seeit_uploads:
  seeit_models:
