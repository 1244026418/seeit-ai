name: SeeIt AI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: 后端测试
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安装依赖
        run: python -m pip install -r requirements.txt
      - name: 执行测试
        run: pytest -q

  frontend:
    name: 前端构建
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: 安装依赖并构建
        run: npm ci && npm run build

  deployment-config:
    name: 校验生产 Compose
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      - name: 校验 Compose 配置
        run: docker compose --env-file deploy/.env.production.example -f docker-compose.prod.yml config --quiet
